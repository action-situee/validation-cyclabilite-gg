name = "validation-cyclabilite-gg"
pages_build_output_dir = "./dist"
compatibility_date = "2026-03-17"

[vars]
VITE_CONTRIBUTIONS_API_BASE = "/api"
VITE_PM_TILES_BIKE_SEGMENT = "https://pub-23cee30d1f03450dbc03f60446ae3cf6.r2.dev/bike_agglo_segment.pmtiles"
VITE_PM_TILES_BIKE_CARREAU200 = "https://pub-23cee30d1f03450dbc03f60446ae3cf6.r2.dev/bike_agglo_carreau200.pmtiles"
VITE_PM_TILES_PERIMETER = "https://pub-1aeb7e0af59940a9bf635336182c8eaa.r2.dev/canton_perimeter.pmtiles"
VITE_PM_TILES_CORRIDORS = "https://pub-23cee30d1f03450dbc03f60446ae3cf6.r2.dev/corridors.pmtiles"
VITE_PM_TILES_CORRIDORS_MASK = "https://pub-23cee30d1f03450dbc03f60446ae3cf6.r2.dev/corridors-mask.pmtiles"
VITE_FAISCEAU_GAILLARD_GEOJSON_URL = "/data/corridors/f3_perimetre_arrondi.geojson"
VITE_FAISCEAU_STJULIEN_GEOJSON_URL = "/data/corridors/f4_perimetre_arrondi.geojson"
VITE_BIKE_SOURCE_LAYER = "bikenet"
VITE_PERIMETER_SOURCE_LAYER = "canton_perimeter"
VITE_CORRIDORS_SOURCE_LAYER = "corridors"
VITE_CORRIDORS_MASK_SOURCE_LAYER = "corridors_mask"
VITE_MAP_STYLE_VOYAGER = "https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json"
VITE_MAP_STYLE_SWISS_LIGHT = "https://vectortiles.geo.admin.ch/styles/ch.swisstopo.lightbasemap.vt/style.json"
VITE_MAP_STYLE_SWISS_IMAGERY = "https://vectortiles.geo.admin.ch/styles/ch.swisstopo.imagerybasemap.vt/style.json"

# The application now stores contributions in D1.
[[d1_databases]]
binding = "CONTRIBUTIONS_DB"
database_name = "validation-cyclabilite-gg-v2"
database_id = "de1ee4a4-42ab-45e0-b971-9149ee2eabef"
migrations_dir = "migrations"
